name: Daily schedule refresh

on:
  schedule:
    - cron: '0 10 * * *'  # Every day at 10am UTC (6am ET)
  workflow_dispatch:       # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        run: git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" .

      - name: Install dependencies
        run: pip3 install requests pandas

      - name: Fetch schedule data
        run: python3 fetch_schedules.py

      - name: Export to CSV
        run: python3 export_csv.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedules.csv pitcher_fip.csv
          git diff --staged --quiet || git commit -m "Auto-refresh schedule data"
          git push
